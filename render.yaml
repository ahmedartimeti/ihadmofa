services:
  - type: web
    name: ihadmofa
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    startCommand: gunicorn mofa_smart_planner.wsgi:application --log-file -
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ihadmofa.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://ihadmofa.onrender.com
      - key: SQLITE_PATH
        value: /var/data/db.sqlite3
      - key: MEDIA_ROOT
        value: /var/data/media
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"
    disk:
      name: ihad-sqlite-data
      mountPath: /var/data
      sizeGB: 1
